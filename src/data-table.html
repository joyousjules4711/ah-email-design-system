<!--
==============================================================
AH Data Table Component

File:
src/components/data-table.html

Purpose:
Reusable table component for structured information in
transactional email templates.

Typical usage:
- Payment schedules
- Outstanding debts
- Contract details
- Bank account information
- Deposit settlements
- Itemized amounts

Important:
- The component contains neutral demonstration content only.
- Replace headings, labels and values in the final template.
- Do not introduce undocumented system placeholders.
- Keep tables as simple as possible.
- Use tables for structured data, not for long-form content.
- Mobile overrides are defined in the complete email template.
==============================================================
-->

<table
  role="presentation"
  width="100%"
  cellpadding="0"
  cellspacing="0"
  border="0"
  style="
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    mso-table-lspace: 0;
    mso-table-rspace: 0;
    border: 1px solid #d7e1e6;
    border-radius: 8px;
    overflow: hidden;
    background-color: #ffffff;
  "
>

  <!-- Table Header -->
  <tr>
    <th
      scope="col"
      align="left"
      bgcolor="#033655"
      style="
        padding: 14px 16px;
        background-color: #033655;
        font-family: Arial, sans-serif;
        font-size: 10pt;
        line-height: 14pt;
        font-weight: bold;
        color: #ffffff;
        text-align: left;
        border-bottom: 1px solid #d7e1e6;
      "
    >
      Column heading
    </th>

    <th
      scope="col"
      align="left"
      bgcolor="#033655"
      style="
        padding: 14px 16px;
        background-color: #033655;
        font-family: Arial, sans-serif;
        font-size: 10pt;
        line-height: 14pt;
        font-weight: bold;
        color: #ffffff;
        text-align: left;
        border-bottom: 1px solid #d7e1e6;
      "
    >
      Column heading
    </th>

    <th
      scope="col"
      align="right"
      bgcolor="#033655"
      style="
        padding: 14px 16px;
        background-color: #033655;
        font-family: Arial, sans-serif;
        font-size: 10pt;
        line-height: 14pt;
        font-weight: bold;
        color: #ffffff;
        text-align: right;
        border-bottom: 1px solid #d7e1e6;
      "
    >
      Amount
    </th>
  </tr>

  <!-- Data Row -->
  <tr>
    <td
      align="left"
      valign="top"
      style="
        padding: 14px 16px;
        background-color: #ffffff;
        font-family: Arial, sans-serif;
        font-size: 10pt;
        line-height: 16pt;
        font-weight: normal;
        color: #033655;
        text-align: left;
        vertical-align: top;
        border-bottom: 1px solid #d7e1e6;
      "
    >
      Example value
    </td>

    <td
      align="left"
      valign="top"
      style="
        padding: 14px 16px;
        background-color: #ffffff;
        font-family: Arial, sans-serif;
        font-size: 10pt;
        line-height: 16pt;
        font-weight: normal;
        color: #033655;
        text-align: left;
        vertical-align: top;
        border-bottom: 1px solid #d7e1e6;
      "
    >
      Example value
    </td>

    <td
      align="right"
      valign="top"
      style="
        padding: 14px 16px;
        background-color: #ffffff;
        font-family: Arial, sans-serif;
        font-size: 10pt;
        line-height: 16pt;
        font-weight: normal;
        color: #033655;
        text-align: right;
        vertical-align: top;
        white-space: nowrap;
        border-bottom: 1px solid #d7e1e6;
      "
    >
      EUR 100,00
    </td>
  </tr>

  <!-- Optional Additional Data Row -->
  <tr>
    <td
      align="left"
      valign="top"
      style="
        padding: 14px 16px;
        background-color: #eff3f5;
        font-family: Arial, sans-serif;
        font-size: 10pt;
        line-height: 16pt;
        font-weight: normal;
        color: #033655;
        text-align: left;
        vertical-align: top;
        border-bottom: 1px solid #d7e1e6;
      "
    >
      Example value
    </td>

    <td
      align="left"
      valign="top"
      style="
        padding: 14px 16px;
        background-color: #eff3f5;
        font-family: Arial, sans-serif;
        font-size: 10pt;
        line-height: 16pt;
        font-weight: normal;
        color: #033655;
        text-align: left;
        vertical-align: top;
        border-bottom: 1px solid #d7e1e6;
      "
    >
      Example value
    </td>

    <td
      align="right"
      valign="top"
      style="
        padding: 14px 16px;
        background-color: #eff3f5;
        font-family: Arial, sans-serif;
        font-size: 10pt;
        line-height: 16pt;
        font-weight: normal;
        color: #033655;
        text-align: right;
        vertical-align: top;
        white-space: nowrap;
        border-bottom: 1px solid #d7e1e6;
      "
    >
      EUR 100,00
    </td>
  </tr>

  <!-- Total Row -->
  <tr>
    <td
      colspan="2"
      align="left"
      bgcolor="#7dc097"
      style="
        padding: 15px 16px;
        background-color: #7dc097;
        font-family: Arial, sans-serif;
        font-size: 10pt;
        line-height: 14pt;
        font-weight: bold;
        color: #033655;
        text-align: left;
      "
    >
      Total
    </td>

    <td
      align="right"
      bgcolor="#7dc097"
      style="
        padding: 15px 16px;
        background-color: #7dc097;
        font-family: Arial, sans-serif;
        font-size: 10pt;
        line-height: 14pt;
        font-weight: bold;
        color: #033655;
        text-align: right;
        white-space: nowrap;
      "
    >
      EUR 200,00
    </td>
  </tr>

</table>

<!-- End AH Data Table Component -->
