```html
<!--
  AH Hero Component

  File:
  src/components/hero.html

  Purpose:
  Reusable Hero component for transactional email templates.

  Important:
  - The component contains neutral demonstration content only.
  - Replace the demonstration content when inserting the component
    into a specific email template.
  - Do not introduce undocumented system placeholders.
  - The logo will be added later.
  - Mobile overrides are defined in the complete email template.
-->

<table
  role="presentation"
  width="100%"
  cellpadding="0"
  cellspacing="0"
  border="0"
  style="
    width: 100%;
    border-collapse: collapse;
    mso-table-lspace: 0;
    mso-table-rspace: 0;
    background-color: #033655;
  "
>
  <tr>
    <td
      class="ah-hero"
      align="left"
      style="
        padding: 48px 44px;
        background-color: #033655;
        text-align: left;
      "
    >

      <!--
        Optional logo

        The approved white Akademikerhilfe logo will be added here later.
        The Hero must remain understandable if the image is blocked.
      -->

      <!-- Department label -->
      <p
        style="
          margin: 0 0 12px 0;
          padding: 0;
          font-family: Arial, sans-serif;
          font-size: 10pt;
          line-height: 15pt;
          font-weight: bold;
          letter-spacing: 1.5px;
          text-transform: uppercase;
          color: #7dc097;
        "
      >
        Department label
      </p>

      <!-- Primary email title -->
      <h1
        style="
          margin: 0;
          padding: 0;
          font-family: Georgia, 'Times New Roman', serif;
          font-size: 30pt;
          line-height: 36pt;
          font-weight: normal;
          color: #ffffff;
        "
      >
        Email title
      </h1>

      <!-- Mint accent line -->
      <table
        role="presentation"
        cellpadding="0"
        cellspacing="0"
        border="0"
        style="
          border-collapse: collapse;
          margin-top: 24px;
          mso-table-lspace: 0;
          mso-table-rspace: 0;
        "
      >
        <tr>
          <td
            width="150"
            height="2"
            style="
              width: 150px;
              height: 2px;
              background-color: #7dc097;
              font-size: 0;
              line-height: 0;
            "
          >
            &nbsp;
          </td>
        </tr>
      </table>

      <!--
        Optional supporting text

        Remove the complete paragraph when no supporting text is required.
      -->
      <p
        style="
          margin: 24px 0 0 0;
          padding: 0;
          font-family: Arial, sans-serif;
          font-size: 10pt;
          line-height: 16pt;
          font-weight: normal;
          color: #eff3f5;
        "
      >
        Optional supporting information appears here.
      </p>

    </td>
  </tr>
</table>
```
