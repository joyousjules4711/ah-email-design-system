<!--
==============================================================
AH Technical Footer Component

File:
src/components/footer.html

Purpose:
Displays internal reference information after the Corporate
Signature.

Content:
- Object Code
- Person ID

Important:
- This component appears once at the end of every email.
- Do not include contact, legal or marketing information.
- Keep the footer visually secondary.
- Placeholder names are defined by the source system and must
  not be changed.
==============================================================
-->

<table
  role="presentation"
  width="100%"
  cellpadding="0"
  cellspacing="0"
  border="0"
  style="
    width:100%;
    border-collapse:collapse;
    mso-table-lspace:0;
    mso-table-rspace:0;
    background-color:#eff3f5;
  "
>
  <tr>
    <td
      class="ah-technical-footer"
      align="center"
      style="
        padding:24px 44px;
        background-color:#eff3f5;
        border-top:1px solid #d7e1e6;
        font-family:Arial,sans-serif;
        font-size:9pt;
        line-height:12pt;
        font-weight:normal;
        color:#748894;
        text-align:center;
      "
    >
      Object Code: {OBJECT_CODE} | Person ID: {PERSON_ID}
    </td>
  </tr>
</table>

<!-- End AH Technical Footer Component -->
