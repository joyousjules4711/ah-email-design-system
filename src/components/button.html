<!--
==============================================================
AH Button Component

File:
src/components/button.html

Purpose:
Reusable call-to-action component for transactional emails.

Variants:
- Primary Button
- Secondary Button

Implementation:
- Table-based layout
- Inline CSS
- VML fallback for Microsoft Outlook on Windows
- Rounded corners in supported email clients
- No shadows or gradients

Important:
- Replace the demonstration URL and button label.
- Use one Primary Button per email whenever possible.
- Secondary Buttons are reserved for optional actions.
- When using VML, the complete email document should include:

  xmlns:v="urn:schemas-microsoft-com:vml"
  xmlns:o="urn:schemas-microsoft-com:office:office"

  Example:

  <html
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:v="urn:schemas-microsoft-com:vml"
    xmlns:o="urn:schemas-microsoft-com:office:office"
  >
==============================================================
-->


<!-- ==========================================================
PRIMARY BUTTON
=========================================================== -->

<table
  role="presentation"
  cellpadding="0"
  cellspacing="0"
  border="0"
  style="
    border-collapse: collapse;
    mso-table-lspace: 0;
    mso-table-rspace: 0;
  "
>
  <tr>
    <td
      align="left"
      style="
        padding: 0;
        text-align: left;
      "
    >

      <!--[if mso]>
      <v:roundrect
        xmlns:v="urn:schemas-microsoft-com:vml"
        xmlns:w="urn:schemas-microsoft-com:office:word"
        href="https://example.com"
        style="
          height: 44px;
          v-text-anchor: middle;
          width: 220px;
        "
        arcsize="18%"
        strokecolor="#033655"
        fillcolor="#033655"
      >
        <w:anchorlock/>
        <center
          style="
            font-family: Arial, sans-serif;
            font-size: 10pt;
            font-weight: bold;
            color: #ffffff;
          "
        >
          Primary action
        </center>
      </v:roundrect>
      <![endif]-->

      <!--[if !mso]><!-- -->
      <table

          border-collapse: separate;

          mso-table-rspace: 0;
        "
      >
        <tr>
          <td
            align="center"
            bgcolor="#033655"
            style="
              background-color: #033655;
              border: 1px solid #033655;
              border-radius: 8px;
              text-align: center;
            "
          >
            <a
              href="https://example.com"
              target="_blank"
              style="
                display: inline-block;
                padding: 14px 30px;
                font-family: Arial, sans-serif;
                font-size: 10pt;
                line-height: 14pt;
                font-weight: bold;
                color: #ffffff;
                text-decoration: none;
                text-align: center;
                border-radius: 8px;
              "
            >
              Primary action
            </a>
          </td>
        </tr>
      </table>
      <!--<![endif]-->

    </td>
  </tr>
</table>

<!-- End Primary Button -->
