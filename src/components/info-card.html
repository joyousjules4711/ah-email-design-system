<!--
==============================================================
AH Info Card Component

File:
src/components/info-card.html

Purpose:
Reusable information card for supporting content in
transactional email templates.

Typical usage:
- Deadlines
- Additional information
- Data protection notices
- Waiting list information
- SEPA information
- Process explanations

Important:
- The component contains neutral demonstration content only.
- Replace the demonstration heading and body text.
- Do not introduce undocumented system placeholders.
- The heading is optional.
- The Mint accent is decorative and must not be the only
  indicator of meaning.
- Mobile overrides are defined in the complete email template.
==============================================================
-->

<table
  role="presentation"
  width="100%"
  cellpadding="0"
  cellspacing="0"
  border="0"
  style="
    width: 100%;
    border-collapse: separate;
    mso-table-lspace: 0;
    mso-table-rspace: 0;
  "
>
  <tr>
    <td
      class="ah-info-card"
      bgcolor="#eff3f5"
      style="
        padding: 24px 28px;
        background-color: #eff3f5;
        border-left: 4px solid #7dc097;
        border-radius: 8px;
        text-align: left;
      "
    >

      <!-- Optional heading
           Remove the complete heading block when no heading is required. -->
      <p
        style="
          margin: 0 0 12px 0;
          padding: 0;
          font-family: Arial, sans-serif;
          font-size: 11pt;
          line-height: 16pt;
          font-weight: bold;
          color: #033655;
        "
      >
        Information heading
      </p>

      <!-- Main information text -->
      <p
        style="
          margin: 0;
          padding: 0;
          font-family: Arial, sans-serif;
          font-size: 10pt;
          line-height: 16pt;
          font-weight: normal;
          color: #033655;
        "
      >
        Supporting information appears here. Keep the message concise and
        explain clearly why this information is relevant to the recipient.
      </p>

      <!-- Optional additional paragraph
           Remove this block when no additional information is required. -->
      <p
        style="
          margin: 16px 0 0 0;
          padding: 0;
          font-family: Arial, sans-serif;
          font-size: 10pt;
          line-height: 16pt;
          font-weight: normal;
          color: #033655;
        "
      >
        Additional context may appear here if it directly supports the
        primary information.
      </p>

      <!--
        Optional component area

        Insert a documented component here where required.

        Examples:
        - AH Button
        - Descriptive link
        - Short structured list

        Avoid placing complex tables or multiple actions inside an Info Card.
      -->

    </td>
  </tr>
</table>

<!-- End AH Info Card Component -->
