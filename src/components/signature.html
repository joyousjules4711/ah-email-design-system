<!--
==============================================================
AH Corporate Signature Component

File:
src/components/signature.html

Purpose:
Reusable corporate signature for Akademikerhilfe transactional
email templates.

Variable content:
- Department or team name
- Department email address
- Optional department phone number

Important:
- Replace the neutral demonstration content in each template.
- The Akademikerhilfe logo will be added later.
- Contact links should remain clickable.
- Do not include Object Code or Person ID here.
  Technical references belong in footer.html.
==============================================================
-->

<table
  role="presentation"
  width="100%"
  cellpadding="0"
  cellspacing="0"
  border="0"
  style="
    width:100%;
    border-collapse:collapse;
    mso-table-lspace:0;
    mso-table-rspace:0;
    background-color:#ffffff;
  "
>
  <tr>
    <td
      class="ah-signature"
      align="left"
      style="
        padding:48px 44px 32px 44px;
        background-color:#ffffff;
        font-family:Arial,sans-serif;
        font-size:10pt;
        line-height:16pt;
        font-weight:normal;
        color:#033655;
        text-align:left;
      "
    >

      <!--
      ==========================================================
      Optional Akademikerhilfe Logo

      Add the approved logo once the final asset path and image
      delivery method have been defined.

      Example:

      <img
        src="{LOGO_URL}"
        width="220"
        alt="Akademikerhilfe"
        style="
          display:block;
          width:220px;
          max-width:100%;
          height:auto;
          margin:0 0 24px 0;
          padding:0;
          border:0;
          outline:none;
          text-decoration:none;
          -ms-interpolation-mode:bicubic;
        "
      >
      ==========================================================
      -->

      <!-- Team or Department -->
      <p
        style="
          margin:0 0 20px 0;
          padding:0;
          font-family:Arial,sans-serif;
          font-size:12pt;
          line-height:17pt;
          font-weight:bold;
          color:#033655;
        "
      >
        Department name
      </p>

      <!-- Organisation and Address -->
      <p
        style="
          margin:0 0 14px 0;
          padding:0;
          font-family:Arial,sans-serif;
          font-size:10pt;
          line-height:16pt;
          font-weight:normal;
          color:#033655;
        "
      >
        Akademikerhilfe | Pfeilgasse 3a, A-1080 Wien
      </p>

      <!-- Contact Information -->
      <p
        style="
          margin:0 0 14px 0;
          padding:0;
          font-family:Arial,sans-serif;
          font-size:10pt;
          line-height:16pt;
          font-weight:normal;
          color:#033655;
        "
      >
        <a
          href="tel:+43140176"
          style="
            color:#033655;
            text-decoration:none;
          "
        >
          +43 1 40176
        </a>
        &nbsp;|&nbsp;
        <a
          href="mailto:department@akademikerhilfe.at"
          style="
            color:#033655;
            text-decoration:none;
          "
        >
          department@akademikerhilfe.at
        </a>
      </p>

      <!-- Website -->
      <p
        style="
          margin:0 0 18px 0;
          padding:0;
          font-family:Arial,sans-serif;
          font-size:10pt;
          line-height:16pt;
          font-weight:normal;
          color:#033655;
        "
      >
        <a
          href="https://www.akademikerhilfe.at/"
          target="_blank"
          style="
            color:#033655;
            text-decoration:none;
          "
        >
          www.akademikerhilfe.at
        </a>
      </p>

      <!-- Legal Information -->
      <p
        style="
          margin:0;
          padding:0;
          font-family:Arial,sans-serif;
          font-size:9pt;
          line-height:14pt;
          font-weight:normal;
          color:#506b7a;
        "
      >
        ZVR: 431442523 | ATU38108506
      </p>

      <!-- Authorized Representative Information -->
      <p
        style="
          margin:14px 0 0 0;
          padding:0;
          font-family:Arial,sans-serif;
          font-size:9pt;
          line-height:14pt;
          font-weight:normal;
          color:#506b7a;
        "
      >
        Bevollmächtigte für die<br>
        Gemeinnützige Bau- und Wohnungsgenossenschaft<br>
        der Hochschüler in Leoben reg. Gen.m.b.H.
      </p>

    </td>
  </tr>
</table>

<!-- End AH Corporate Signature Component -->
