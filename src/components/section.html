```html
<!--
  AH Section Component

  File:
  src/components/section.html

  Purpose:
  Reusable content section for transactional email templates.

  Important:
  - The component contains neutral demonstration content only.
  - Replace the demonstration content when inserting the component
    into a specific email template.
  - Do not introduce undocumented system placeholders.
  - The optional AH Icon will be added when the final asset path
    and delivery method have been defined.
  - Mobile overrides are defined in the complete email template.
-->

<table
  role="presentation"
  width="100%"
  cellpadding="0"
  cellspacing="0"
  border="0"
  style="
    width: 100%;
    border-collapse: collapse;
    mso-table-lspace: 0;
    mso-table-rspace: 0;
    background-color: #ffffff;
  "
>
  <tr>
    <td
      class="ah-section"
      align="left"
      style="
        padding: 48px 44px;
        background-color: #ffffff;
        text-align: left;
      "
    >

      <!-- Section Heading -->
      <table
        role="presentation"
        width="100%"
        cellpadding="0"
        cellspacing="0"
        border="0"
        style="
          width: 100%;
          border-collapse: collapse;
          mso-table-lspace: 0;
          mso-table-rspace: 0;
        "
      >
        <tr>

          <!--
            Optional AH Icon

            Activate this table cell once the final icon asset path
            and delivery method have been defined.

          <td
            width="36"
            valign="middle"
            style="
              width: 36px;
              padding: 0 12px 0 0;
              vertical-align: middle;
            "
          >
            <img
              src="../../assets/icons/AH_Logo_2026_WEB-RGB-Mini.png"
              width="24"
              alt=""
              style="
                display: block;
                width: 24px;
                height: auto;
                margin: 0;
                padding: 0;
                border: 0;
                outline: none;
                text-decoration: none;
                -ms-interpolation-mode: bicubic;
              "
            >
          </td>
          -->

          <td
            valign="middle"
            style="
              padding: 0;
              vertical-align: middle;
            "
          >
            <h2
              style="
                margin: 0;
                padding: 0;
                font-family: Arial, sans-serif;
                font-size: 16pt;
                line-height: 20pt;
                font-weight: bold;
                color: #033655;
              "
            >
              Section heading
            </h2>
          </td>

        </tr>
      </table>

      <!-- Introductory Text -->
      <p
        style="
          margin: 16px 0 0 0;
          padding: 0;
          font-family: Arial, sans-serif;
          font-size: 10pt;
          line-height: 16pt;
          font-weight: normal;
          color: #033655;
        "
      >
        A short introduction explains the purpose of this section.
      </p>

      <!-- Main Content -->
      <p
        style="
          margin: 16px 0 0 0;
          padding: 0;
          font-family: Arial, sans-serif;
          font-size: 10pt;
          line-height: 16pt;
          font-weight: normal;
          color: #033655;
        "
      >
        Additional content appears here. Keep each section focused on one
        topic and use short paragraphs to improve readability.
      </p>

      <!--
        Optional Component Area

        Insert one or more documented components here where required.

        Examples:

        - AH Button
        - AH Info Card
        - AH Feature Panel
        - AH Data Table
        - AH List

        Do not add unrelated content to the same section.
      -->

    </td>
  </tr>
</table>

<!-- End AH Section Component -->
```
